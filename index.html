<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>HTML Vježba 13</title>
    </head>
    <body>
        <h1>Account registration</h1>
        <form>
            <label>
                <strong>Ime</strong><br>
                <input type="text" name="first_name">
            </label>
            <hr>
            <label>
                <strong>Prezime</strong><br>
                <input type="text" name="last_name">
            </label>
            <hr>
            <label>
                <strong>Email</strong><br>
                <input type="email" name="email">
            </label>
            <hr>
            <label>
                <strong>Password</strong><br>
                <input type="password" name="password">
            </label>
            <hr>
            <label>
                <strong>Visina(cm)</strong><br>
                <input type="number" name="height">
            </label>
            <hr>
            <label>
                <strong>Najdraža boja</strong><br>
                <input type="color" name="color">
            </label>
            <hr>
            <strong>Spol</strong>
            <label><input type="radio" name="gender" value="M">Muško</label>            
            <label><input type="radio" name="gender" value="Ž">Žensko</label>
            <label><input type="radio" name="gender" value="T">Treće</label>
            <label><input type="radio" name="gender" value="N">Ne želim reći</label>
            <hr>
            <strong>Novosti</strong>
            <label><input type="checkbox" name="preferences" value="updates">Obavijesti</label>
            <label><input type="checkbox" name="preferences" value="coupons">Kuponi</label>
            <hr>
            <label><input type="checkbox" name="gdpr"><strong>Prihvaćam pravila</strong></label>
            <hr>
            <button>Register</button>
        </form>
    </body>
</html>
